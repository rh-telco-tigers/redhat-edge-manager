---
- name: Look up Satellite registry identifiers for the fleet image reference
  hosts: satellite_hosts
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    satellite_bootc_registry_enabled_effective: "{{ (satellite_install_enabled | default(true, true) | bool) and (bootc_use_satellite_registry | default(true, true) | bool) }}"
    satellite_initial_organization_effective: "{{ satellite_initial_organization | default('RHEM Demo', true) }}"
    satellite_bootc_product_name_effective: "{{ satellite_bootc_product_name | default('bootc', true) }}"
    satellite_registry_org_id_effective: "{{ satellite_registry_org_id | default('', true) }}"
    satellite_registry_product_id_effective: "{{ satellite_registry_product_id | default('', true) }}"
  tasks:
    - name: Skip Satellite lookup when the bootc image does not use Satellite
      ansible.builtin.meta: end_host
      when: not satellite_bootc_registry_enabled_effective

    - name: Skip Satellite lookup when explicit registry IDs are already set
      ansible.builtin.set_fact:
        satellite_bootc_org_id_effective: "{{ satellite_registry_org_id_effective | trim }}"
        satellite_bootc_product_id_effective: "{{ satellite_registry_product_id_effective | trim }}"
      when:
        - satellite_registry_org_id_effective | trim | length > 0
        - satellite_registry_product_id_effective | trim | length > 0

    - name: End the Satellite lookup play when explicit registry IDs are already set
      ansible.builtin.meta: end_host
      when:
        - satellite_registry_org_id_effective | trim | length > 0
        - satellite_registry_product_id_effective | trim | length > 0

    - name: Wait for Satellite SSH to become ready
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 10

    - name: Gather Satellite facts after SSH is ready
      ansible.builtin.setup:

    - name: Look up the Satellite organization ID
      ansible.builtin.shell: |
        set -euo pipefail
        hammer --output csv organization list | python3 -c 'import csv, os, sys; target = os.environ["SATELLITE_ORG"]; print(next((row["Id"] for row in csv.DictReader(sys.stdin) if row["Title"] == target or row["Name"] == target or row["Label"] == target), ""))'
      args:
        executable: /bin/bash
      environment:
        SATELLITE_ORG: "{{ satellite_initial_organization_effective }}"
      register: _satellite_org_id
      changed_when: false

    - name: Look up the Satellite bootc product ID
      ansible.builtin.shell: |
        set -euo pipefail
        hammer --output csv product list --organization-id "${SATELLITE_ORG_ID}" | python3 -c 'import csv, os, sys; product_name = os.environ["SATELLITE_PRODUCT_NAME"]; print(next((row["Id"] for row in csv.DictReader(sys.stdin) if row["Name"] == product_name), ""))'
      args:
        executable: /bin/bash
      environment:
        SATELLITE_ORG_ID: "{{ _satellite_org_id.stdout | trim }}"
        SATELLITE_PRODUCT_NAME: "{{ satellite_bootc_product_name_effective }}"
      register: _satellite_product_id
      changed_when: false

    - name: Persist Satellite registry facts for the fleet image reference
      ansible.builtin.set_fact:
        satellite_bootc_org_id_effective: "{{ _satellite_org_id.stdout | trim }}"
        satellite_bootc_product_id_effective: "{{ _satellite_product_id.stdout | trim }}"

- name: Create or update the demo Edge Manager fleet
  hosts: rhem_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    fleet_workspace_dir_effective: "{{ bootc_workspace_dir | default('/var/lib/rhem-demo/bootc', true) }}"
    fleet_flightctl_config_dir_effective: "{{ fleet_workspace_dir_effective }}/flightctl"
    demo_fleet_name_effective: "{{ demo_fleet_name | default('demo', true) }}"
    demo_fleet_manifest_effective: "{{ fleet_workspace_dir_effective }}/{{ demo_fleet_name_effective }}-fleet.yaml"
    demo_fleet_selector_labels_effective: "{{ demo_fleet_selector_labels | default({'fleet': 'demo'}, true) }}"
    fleet_rhem_api_url_effective: "{{ rhem_api_url | default('https://' ~ fqdn ~ ':3443', true) }}"
    fleet_flightctl_username_effective: "{{ edge_manager_admin_username | default(rhem_admin_username, true) }}"
    fleet_flightctl_password_effective: "{{ edge_manager_admin_password | default(rhem_admin_password, true) }}"
    bootc_use_satellite_registry_effective: "{{ (bootc_use_satellite_registry | default(true, true) | bool) and ((groups['satellite_hosts'] | default([])) | length > 0) }}"
    bootc_satellite_registry_host_effective: "{{ satellite_registry_host | default((hostvars[groups['satellite_hosts'][0]].fqdn | default('')) if bootc_use_satellite_registry_effective else '', true) }}"
    bootc_satellite_org_id_effective: "{{ satellite_registry_org_id | default((hostvars[groups['satellite_hosts'][0]].satellite_bootc_org_id_effective | default('')) if bootc_use_satellite_registry_effective else '', true) }}"
    bootc_satellite_product_id_effective: "{{ satellite_registry_product_id | default((hostvars[groups['satellite_hosts'][0]].satellite_bootc_product_id_effective | default('')) if bootc_use_satellite_registry_effective else '', true) }}"
    bootc_satellite_repository_name_effective: "{{ satellite_bootc_repository_name | default('device-os', true) }}"
    demo_fleet_image_repo_default_effective: "{{ (bootc_satellite_registry_host_effective ~ '/id/' ~ bootc_satellite_org_id_effective ~ '/' ~ bootc_satellite_product_id_effective ~ '/' ~ bootc_satellite_repository_name_effective) if bootc_use_satellite_registry_effective else 'localhost/rhem-demo/device-os' }}"
    demo_fleet_image_repo_effective: "{{ demo_fleet_image_repo | default(bootc_image_repo | default(demo_fleet_image_repo_default_effective, true), true) }}"
    demo_fleet_image_tag_effective: "{{ demo_fleet_image_tag | default(bootc_image_tag | default('v1', true), true) }}"
    demo_fleet_image_ref_effective: "{{ demo_fleet_image_repo_effective }}:{{ demo_fleet_image_tag_effective }}"
    demo_application_enabled_effective: "{{ demo_application_enabled | default(false, true) | bool }}"
    demo_application_name_effective: "{{ demo_application_name | default('hello-web', true) }}"
    demo_application_type_effective: "{{ demo_application_type | default('quadlet', true) }}"
    demo_application_package_repo_name_effective: "{{ demo_application_package_repo_name | default('hello-web-package', true) }}"
    demo_application_image_tag_effective: "{{ demo_application_image_tag | default('v3', true) }}"
    demo_application_package_image_repo_default_effective: "{{ (bootc_satellite_registry_host_effective ~ '/id/' ~ bootc_satellite_org_id_effective ~ '/' ~ bootc_satellite_product_id_effective ~ '/' ~ demo_application_package_repo_name_effective) if bootc_use_satellite_registry_effective else 'localhost/rhem-demo/' ~ demo_application_package_repo_name_effective }}"
    demo_application_package_image_repo_effective: "{{ demo_application_package_image_repo | default(demo_application_package_image_repo_default_effective, true) }}"
    demo_application_package_image_ref_effective: "{{ demo_application_package_image_repo_effective }}:{{ demo_application_image_tag_effective }}"
    demo_applications_effective: >-
      {{
        demo_applications
        | default(
            [{'name': demo_application_name_effective, 'appType': demo_application_type_effective, 'image': demo_application_package_image_ref_effective}]
            if demo_application_enabled_effective
            else [],
            true
          )
      }}
  tasks:
    - name: Require a flightctl user for fleet management
      ansible.builtin.assert:
        that:
          - fleet_flightctl_username_effective | trim | length > 0
          - fleet_flightctl_password_effective | trim | length > 0
        fail_msg: "Set Edge Manager credentials in automation/ansible/group_vars/all.yml before running make fleet-apply."

    - name: Require a non-local bootc image reference for the fleet
      ansible.builtin.assert:
        that:
          - not (demo_fleet_image_repo_effective is match('^localhost/'))
        fail_msg: "The fleet image reference is still local-only. Run make bootc-build first, or set demo_fleet_image_repo explicitly."

    - name: Ensure the fleet workspace exists
      ansible.builtin.file:
        path: "{{ fleet_workspace_dir_effective }}"
        state: directory
        mode: "0755"

    - name: Authenticate flightctl for fleet management
      ansible.builtin.command:
        argv:
          - flightctl
          - login
          - "{{ fleet_rhem_api_url_effective }}"
          - --config-dir
          - "{{ fleet_flightctl_config_dir_effective }}"
          - --username
          - "{{ fleet_flightctl_username_effective }}"
          - --password
          - "{{ fleet_flightctl_password_effective }}"
          - --insecure-skip-tls-verify
      register: _fleet_login
      changed_when: true
      no_log: true

    - name: Render the fleet manifest
      ansible.builtin.template:
        src: templates/fleet.demo.yaml.j2
        dest: "{{ demo_fleet_manifest_effective }}"
        mode: "0644"

    - name: Apply the fleet manifest
      ansible.builtin.command:
        argv:
          - flightctl
          - apply
          - --config-dir
          - "{{ fleet_flightctl_config_dir_effective }}"
          - -f
          - "{{ demo_fleet_manifest_effective }}"
      register: _fleet_apply
      changed_when: true

    - name: Show the current fleet
      ansible.builtin.command:
        argv:
          - flightctl
          - get
          - "fleets/{{ demo_fleet_name_effective }}"
          - --config-dir
          - "{{ fleet_flightctl_config_dir_effective }}"
          - -o
          - yaml
      register: _fleet_get
      changed_when: false

    - name: Report the fleet image reference
      ansible.builtin.debug:
        msg:
          fleet_name: "{{ demo_fleet_name_effective }}"
          image_ref: "{{ demo_fleet_image_ref_effective }}"
          selector_labels: "{{ demo_fleet_selector_labels_effective }}"
          applications: "{{ demo_applications_effective }}"
