---
- name: Install Red Hat Edge Manager on the RHEM host
  hosts: rhem_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    _registry_username: "{{ registry_redhat_io_username if (registry_redhat_io_username | default('') | length > 0) else (rhsm_username | default('')) }}"
    _registry_password: "{{ registry_redhat_io_password if (registry_redhat_io_password | default('') | length > 0) else (rhsm_password | default('')) }}"
    rhem_edge_manager_repo_effective: "{{ rhem_edge_manager_repo | default('edge-manager-1.0-for-rhel-9-x86_64-rpms', true) }}"
    rhem_admin_username_effective: "{{ rhem_admin_username | default(edge_manager_admin_username | default('edgemanager-admin', true), true) }}"
    rhem_admin_password_effective: "{{ rhem_admin_password | default(edge_manager_admin_password | default('CHANGEME-edgemanager-admin-password', true), true) }}"
  tasks:
    - name: Ensure Podman is installed
      ansible.builtin.dnf:
        name:
          - podman
        state: present

    - name: Log in to registry.redhat.io when credentials are available
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s' '{{ _registry_password }}' | podman login registry.redhat.io --username '{{ _registry_username }}' --password-stdin
      args:
        executable: /bin/bash
      when:
        - _registry_username | length > 0
        - _registry_password | length > 0
      no_log: true

    - name: Enable the Edge Manager repository
      ansible.builtin.command:
        argv:
          - subscription-manager
          - repos
          - --enable
          - "{{ rhem_edge_manager_repo_effective }}"
      register: _rhem_repo_enable
      changed_when: "'enabled' in (_rhem_repo_enable.stdout | default('') | lower)"
      failed_when: _rhem_repo_enable.rc != 0

    - name: Install flightctl services and CLI
      ansible.builtin.dnf:
        name:
          - flightctl-services
          - flightctl-cli
        state: present

    - name: Enable and start Edge Manager services
      ansible.builtin.systemd:
        name: flightctl.target
        state: started
        enabled: true

    - name: Ensure the flightctl-admin group exists in the PAM issuer container
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - flightctl-pam-issuer
          - sh
          - -lc
          - getent group flightctl-admin >/dev/null || groupadd flightctl-admin

    - name: Ensure the first local admin exists in the PAM issuer container
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - flightctl-pam-issuer
          - sh
          - -lc
          - id -u {{ rhem_admin_username_effective }} >/dev/null 2>&1 || adduser {{ rhem_admin_username_effective }}

    - name: Set the first local admin password
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - -i
          - flightctl-pam-issuer
          - sh
          - -lc
          - echo '{{ rhem_admin_username_effective }}:{{ rhem_admin_password_effective }}' | chpasswd
      no_log: true

    - name: Ensure the first local admin is in flightctl-admin
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - flightctl-pam-issuer
          - usermod
          - -aG
          - flightctl-admin
          - "{{ rhem_admin_username_effective }}"

    - name: Wait for the Edge Manager UI port
      ansible.builtin.wait_for:
        port: 443
        host: "{{ ansible_host | default(inventory_hostname) }}"
        timeout: 180
      delegate_to: localhost
      become: false

    - name: Wait for the Edge Manager API port
      ansible.builtin.wait_for:
        port: 3443
        host: "{{ ansible_host | default(inventory_hostname) }}"
        timeout: 180
      delegate_to: localhost
      become: false
