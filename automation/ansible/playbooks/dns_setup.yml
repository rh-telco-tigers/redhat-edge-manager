---
- name: Install and configure PowerDNS
  hosts: dns_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    demo_dns_zone_effective: "{{ demo_dns_zone | default('rhem-eap.lan', true) }}"
    demo_dns_api_key_effective: "{{ demo_dns_api_key | default('CHANGEME-pdns-api-key', true) }}"
    powerdns_auth_repo_url_effective: "{{ powerdns_auth_repo_url | default('https://repo.powerdns.com/repo-files/el-auth-50.repo', true) }}"
    epel_release_rpm_url: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm"
    epel_rpm_gpg_key_url: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-9"
    epel_rpm_gpg_key_path: "/etc/pki/rpm-gpg/RPM-GPG-KEY-EPEL-9"
    pdns_zone_dir: /etc/pdns/zones
    pdns_zone_path: "{{ pdns_zone_dir }}/{{ demo_dns_zone_effective }}.zone"
    demo_dns_reverse_zone_effective: >-
      {{
        (ansible_host.split('.')[2]) ~ '.' ~
        (ansible_host.split('.')[1]) ~ '.' ~
        (ansible_host.split('.')[0]) ~ '.in-addr.arpa'
      }}
    pdns_reverse_zone_path: "{{ pdns_zone_dir }}/{{ demo_dns_reverse_zone_effective }}.zone"
  tasks:
    - name: Enable CodeReady Builder for EPEL dependencies
      ansible.builtin.command:
        argv:
          - subscription-manager
          - repos
          - --enable
          - codeready-builder-for-rhel-9-x86_64-rpms
      register: _crb_enable
      changed_when: "'enabled' in (_crb_enable.stdout | default('') | lower)"
      failed_when: false

    - name: Download EPEL RPM GPG key
      ansible.builtin.get_url:
        url: "{{ epel_rpm_gpg_key_url }}"
        dest: "{{ epel_rpm_gpg_key_path }}"
        mode: "0644"

    - name: Import EPEL RPM GPG key
      ansible.builtin.rpm_key:
        key: "{{ epel_rpm_gpg_key_path }}"
        state: present

    - name: Install EPEL release package
      ansible.builtin.dnf:
        name:
          - "{{ epel_release_rpm_url }}"
        state: present

    - name: Add PowerDNS repository
      ansible.builtin.get_url:
        url: "{{ powerdns_auth_repo_url_effective }}"
        dest: /etc/yum.repos.d/powerdns-auth.repo
        mode: "0644"

    - name: Install PowerDNS authoritative server
      ansible.builtin.dnf:
        name:
          - pdns
        state: present

    - name: Create PowerDNS zone directory
      ansible.builtin.file:
        path: "{{ pdns_zone_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render PowerDNS main configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/pdns.conf.j2"
        dest: /etc/pdns/pdns.conf
        mode: "0644"

    - name: Render PowerDNS bind backend config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/pdns.named.conf.j2"
        dest: /etc/pdns/named.conf
        mode: "0644"

    - name: Render PowerDNS zone file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/pdns.zone.j2"
        dest: "{{ pdns_zone_path }}"
        mode: "0644"

    - name: Render PowerDNS reverse zone file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/pdns.reverse.zone.j2"
        dest: "{{ pdns_reverse_zone_path }}"
        mode: "0644"

    - name: Restore SELinux labels for PowerDNS config
      ansible.builtin.command: restorecon -RF /etc/pdns
      changed_when: false

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Open DNS service in firewalld when available
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --permanent
          - --add-service=dns
      register: _firewalld_permanent
      changed_when: _firewalld_permanent.rc == 0
      failed_when: false
      when: "'firewalld.service' in ansible_facts.services"

    - name: Reload firewalld when available
      ansible.builtin.command: firewall-cmd --reload
      register: _firewalld_reload
      changed_when: _firewalld_reload.rc == 0
      failed_when: false
      when: "'firewalld.service' in ansible_facts.services"

    - name: Enable and restart PowerDNS
      ansible.builtin.systemd:
        name: pdns
        state: restarted
        enabled: true

    - name: Wait for DNS port
      ansible.builtin.wait_for:
        port: 53
        host: "{{ ansible_host | default(inventory_hostname) }}"
        timeout: 120
      delegate_to: localhost
      become: false
