---
- import_playbook: aap_token_prepare.yml

- name: Prepare the Satellite container registry for bootc images
  hosts: satellite_hosts
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    satellite_bootc_registry_enabled_effective: "{{ (satellite_install_enabled | default(true, true) | bool) and (bootc_use_satellite_registry | default(true, true) | bool) }}"
    satellite_initial_organization_effective: "{{ satellite_initial_organization | default('RHEM Demo', true) }}"
    satellite_bootc_product_name_effective: "{{ satellite_bootc_product_name | default('bootc', true) }}"
    satellite_bootc_product_label_effective: "{{ satellite_bootc_product_label | default('bootc', true) }}"
    satellite_registry_org_id_effective: "{{ satellite_registry_org_id | default('', true) }}"
    satellite_registry_product_id_effective: "{{ satellite_registry_product_id | default('', true) }}"
  tasks:
    - name: Skip Satellite registry preparation when disabled
      ansible.builtin.meta: end_host
      when: not satellite_bootc_registry_enabled_effective

    - name: Wait for Satellite SSH to become ready
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 10

    - name: Gather Satellite facts after SSH is ready
      ansible.builtin.setup:

    - name: Validate explicit Satellite registry IDs for the bootc flow
      ansible.builtin.command:
        argv:
          - hammer
          - product
          - info
          - --organization-id
          - "{{ satellite_registry_org_id_effective | trim }}"
          - --id
          - "{{ satellite_registry_product_id_effective | trim }}"
      register: _satellite_explicit_product
      changed_when: false
      failed_when: false
      when:
        - satellite_registry_org_id_effective | trim | length > 0
        - satellite_registry_product_id_effective | trim | length > 0

    - name: Reuse explicit Satellite registry IDs when they are valid
      ansible.builtin.set_fact:
        satellite_bootc_org_id_effective: "{{ satellite_registry_org_id_effective | trim }}"
        satellite_bootc_product_id_effective: "{{ satellite_registry_product_id_effective | trim }}"
      when:
        - satellite_registry_org_id_effective | trim | length > 0
        - satellite_registry_product_id_effective | trim | length > 0
        - _satellite_explicit_product.rc == 0

    - name: End the Satellite registry preparation play when explicit registry IDs are valid
      ansible.builtin.meta: end_host
      when:
        - satellite_registry_org_id_effective | trim | length > 0
        - satellite_registry_product_id_effective | trim | length > 0
        - _satellite_explicit_product.rc == 0

    - name: Reuse the explicit Satellite organization ID when provided
      ansible.builtin.set_fact:
        satellite_bootc_org_id_lookup_effective: "{{ satellite_registry_org_id_effective | trim }}"
      when: satellite_registry_org_id_effective | trim | length > 0

    - name: Look up the Satellite organization ID
      ansible.builtin.shell: |
        set -euo pipefail
        hammer --output csv organization list | python3 -c 'import csv, os, sys; target = os.environ["SATELLITE_ORG"]; print(next((row["Id"] for row in csv.DictReader(sys.stdin) if row["Title"] == target or row["Name"] == target or row["Label"] == target), ""))'
      args:
        executable: /bin/bash
      environment:
        SATELLITE_ORG: "{{ satellite_initial_organization_effective }}"
      register: _satellite_org_id
      changed_when: false
      when: satellite_registry_org_id_effective | trim | length == 0

    - name: Set the effective Satellite organization ID for the bootc flow
      ansible.builtin.set_fact:
        satellite_bootc_org_id_lookup_effective: "{{ satellite_bootc_org_id_lookup_effective | default(((_satellite_org_id | default({})).stdout | default('', true)) | trim, true) }}"

    - name: Require a Satellite organization ID for the bootc flow
      ansible.builtin.assert:
        that:
          - satellite_bootc_org_id_lookup_effective | trim | length > 0
        fail_msg: "Could not determine the Satellite organization ID for {{ satellite_initial_organization_effective }}."

    - name: Allow unauthenticated pull from the Satellite Library lifecycle environment
      ansible.builtin.command:
        argv:
          - hammer
          - lifecycle-environment
          - update
          - --organization-id
          - "{{ satellite_bootc_org_id_lookup_effective }}"
          - --name
          - Library
          - --registry-unauthenticated-pull
          - "true"
      register: _satellite_library_update
      changed_when: true

    - name: Look up the Satellite bootc product ID
      ansible.builtin.shell: |
        set -euo pipefail
        hammer --output csv product list --organization-id "${SATELLITE_ORG_ID}" | python3 -c 'import csv, os, sys; product_name = os.environ["SATELLITE_PRODUCT_NAME"]; print(next((row["Id"] for row in csv.DictReader(sys.stdin) if row["Name"] == product_name), ""))'
      args:
        executable: /bin/bash
      environment:
        SATELLITE_ORG_ID: "{{ satellite_bootc_org_id_lookup_effective }}"
        SATELLITE_PRODUCT_NAME: "{{ satellite_bootc_product_name_effective }}"
      register: _satellite_product_id_lookup
      changed_when: false

    - name: Create the Satellite bootc product when missing
      ansible.builtin.command:
        argv:
          - hammer
          - product
          - create
          - --organization-id
          - "{{ satellite_bootc_org_id_lookup_effective }}"
          - --name
          - "{{ satellite_bootc_product_name_effective }}"
          - --label
          - "{{ satellite_bootc_product_label_effective }}"
      when: _satellite_product_id_lookup.stdout | trim | length == 0

    - name: Look up the Satellite bootc product ID after creation
      ansible.builtin.shell: |
        set -euo pipefail
        hammer --output csv product list --organization-id "${SATELLITE_ORG_ID}" | python3 -c 'import csv, os, sys; product_name = os.environ["SATELLITE_PRODUCT_NAME"]; print(next((row["Id"] for row in csv.DictReader(sys.stdin) if row["Name"] == product_name), ""))'
      args:
        executable: /bin/bash
      environment:
        SATELLITE_ORG_ID: "{{ satellite_bootc_org_id_lookup_effective }}"
        SATELLITE_PRODUCT_NAME: "{{ satellite_bootc_product_name_effective }}"
      register: _satellite_product_id
      changed_when: false

    - name: Require a Satellite bootc product ID
      ansible.builtin.assert:
        that:
          - _satellite_product_id.stdout | trim | length > 0
        fail_msg: "Could not determine the Satellite product ID for {{ satellite_bootc_product_name_effective }}."

    - name: Persist Satellite registry facts for the bootc build
      ansible.builtin.set_fact:
        satellite_bootc_org_id_effective: "{{ satellite_bootc_org_id_lookup_effective }}"
        satellite_bootc_product_id_effective: "{{ _satellite_product_id.stdout | trim }}"

- name: Build the demo bootc image and artifacts on the RHEM host
  hosts: rhem_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    repo_root_effective: "{{ playbook_dir | dirname | dirname | dirname }}"
    bootc_binding_effective: "{{ bootc_binding | default('earlybinding', true) }}"
    bootc_workspace_root_effective: "{{ bootc_workspace_dir | default('/var/lib/rhem-demo/bootc', true) }}"
    bootc_source_dir_effective: "{{ repo_root_effective }}/bootc/{{ bootc_binding_effective }}"
    rhem_auth_provider_effective: "{{ rhem_auth_provider | default('keycloak', true) }}"
    bootc_workspace_dir_effective: "{{ bootc_workspace_root_effective }}/{{ bootc_binding_effective }}"
    bootc_flightctl_config_dir: "{{ bootc_workspace_root_effective }}/flightctl"
    bootc_output_dir_effective: "{{ bootc_workspace_dir_effective }}/output"
    bootc_config_file_effective: "{{ bootc_workspace_dir_effective }}/config.yaml"
    bootc_cloud_init_user_data_file_effective: "{{ bootc_workspace_dir_effective }}/cloud-init.user-data.yaml"
    bootc_containerfile_effective: "{{ bootc_workspace_dir_effective }}/Containerfile"
    bootc_installer_config_file_effective: "{{ bootc_workspace_dir_effective }}/config.toml"
    bootc_demo_ssh_public_key_path_effective: "{{ bootc_demo_ssh_public_key_path | default(lookup('env', 'HOME') ~ '/.ssh/redhat-edge-manager-demo.pub', true) }}"
    bootc_demo_ssh_public_key_file_effective: "{{ bootc_workspace_dir_effective }}/demo-authorized-key.pub"
    bootc_demo_hosts_script_effective: "{{ bootc_workspace_dir_effective }}/rhem-demo-hosts.sh"
    bootc_demo_hosts_service_effective: "{{ bootc_workspace_dir_effective }}/rhem-demo-hosts.service"
    bootc_base_image_effective: "{{ bootc_base_image | default('registry.redhat.io/rhel9/rhel-bootc:9.7', true) }}"
    bootc_edge_manager_repo_effective: "{{ bootc_edge_manager_repo | default(rhem_edge_manager_repo | default('edge-manager-1.0-for-rhel-9-x86_64-rpms', true), true) }}"
    bootc_image_tag_effective: "{{ bootc_image_tag | default('v1', true) }}"
    bootc_use_satellite_registry_effective: "{{ (bootc_use_satellite_registry | default(true, true) | bool) and ((groups['satellite_hosts'] | default([])) | length > 0) }}"
    bootc_satellite_registry_host_effective: "{{ satellite_registry_host | default((hostvars[groups['satellite_hosts'][0]].fqdn | default('')) if bootc_use_satellite_registry_effective else '', true) }}"
    bootc_satellite_org_id_effective: "{{ (hostvars[groups['satellite_hosts'][0]].satellite_bootc_org_id_effective | default(satellite_registry_org_id | default('', true), true)) if bootc_use_satellite_registry_effective else '' }}"
    bootc_satellite_product_id_effective: "{{ (hostvars[groups['satellite_hosts'][0]].satellite_bootc_product_id_effective | default(satellite_registry_product_id | default('', true), true)) if bootc_use_satellite_registry_effective else '' }}"
    bootc_satellite_repository_name_effective: "{{ satellite_bootc_repository_name | default('device-os', true) }}"
    bootc_default_image_repo_effective: "{{ (bootc_satellite_registry_host_effective ~ '/id/' ~ bootc_satellite_org_id_effective ~ '/' ~ bootc_satellite_product_id_effective ~ '/' ~ bootc_satellite_repository_name_effective) if bootc_use_satellite_registry_effective else 'localhost/rhem-demo/device-os' }}"
    bootc_image_repo_effective: "{{ bootc_image_repo | default(bootc_default_image_repo_effective, true) }}"
    bootc_image_ref_effective: "{{ bootc_image_repo_effective }}:{{ bootc_image_tag_effective }}"
    bootc_local_build_image_repo_effective: "{{ bootc_local_build_image_repo | default('localhost/rhem-demo/device-os', true) }}"
    bootc_local_build_image_ref_effective: "{{ bootc_local_build_image_repo_effective }}:{{ bootc_image_tag_effective }}"
    bootc_registry_effective: "{{ bootc_registry | default((bootc_image_repo_effective.split('/'))[0] if '/' in bootc_image_repo_effective else '', true) }}"
    bootc_registry_username_effective: "{{ bootc_registry_username | default((satellite_admin_username | default('', true)) if bootc_use_satellite_registry_effective else '', true) }}"
    bootc_registry_password_effective: "{{ bootc_registry_password | default((satellite_admin_password | default('', true)) if bootc_use_satellite_registry_effective else '', true) }}"
    bootc_publish_enabled_effective: "{{ bootc_publish_enabled | default(bootc_use_satellite_registry_effective, true) | bool }}"
    bootc_sign_with_sigstore_effective: "{{ bootc_sign_with_sigstore | default(false, true) | bool }}"
    bootc_publish_disk_image_enabled_effective: "{{ bootc_publish_disk_image_enabled | default(false, true) | bool }}"
    bootc_force_rebuild_effective: "{{ bootc_force_rebuild | default(false, true) | bool }}"
    bootc_build_iso_effective: "{{ bootc_build_iso | default(false, true) | bool }}"
    bootc_build_qcow2_effective: "{{ bootc_build_qcow2 | default(true, true) | bool }}"
    bootc_disk_image_repo_effective: "{{ bootc_disk_image_repo | default(bootc_image_repo_effective ~ '/diskimage-iso', true) }}"
    bootc_disk_image_ref_effective: "{{ bootc_disk_image_repo_effective }}:{{ bootc_image_tag_effective }}"
    bootc_enrollment_signer_effective: "{{ bootc_enrollment_signer | default('enrollment', true) }}"
    bootc_enrollment_expiration_effective: "{{ bootc_enrollment_expiration | default('365d', true) }}"
    bootc_include_enrollment_config_effective: "{{ bootc_binding_effective == 'earlybinding' }}"
    bootc_installer_config_enabled_effective: "{{ bootc_installer_config_enabled | default(true, true) | bool }}"
    bootc_iso_remote_path_effective: "{{ bootc_output_dir_effective }}/bootiso/install.iso"
    bootc_qcow2_remote_path_effective: "{{ bootc_output_dir_effective }}/qcow2/disk.qcow2"
    bootc_flightctl_username_effective: "{{ bootc_flightctl_username | default(edge_manager_admin_username | default(rhem_admin_username, true), true) }}"
    bootc_flightctl_password_effective: "{{ bootc_flightctl_password | default(edge_manager_admin_password | default(rhem_admin_password, true), true) }}"
    bootc_flightctl_token_effective: "{{ aap_edge_manager_oauth_token | default((hostvars[groups['aap_controllers'][0]].aap_edge_manager_oauth_token_effective | default('')) if ((groups['aap_controllers'] | default([])) | length > 0) else '', true) }}"
    bootc_rhem_api_url_effective: "{{ bootc_rhem_api_url | default('https://' ~ fqdn ~ ':3443', true) }}"
    bootc_rhem_api_host_effective: "{{ bootc_rhem_api_url_effective | regex_replace('^https?://([^/:]+).*$','\\1') }}"
    bootc_rhem_agent_api_url_effective: "https://{{ bootc_rhem_api_host_effective }}:7443/"
    bootc_rhem_enrollment_ui_url_effective: "https://{{ bootc_rhem_api_host_effective }}:443"
    bootc_registry_redhat_io_username_effective: "{{ registry_redhat_io_username | default(rhsm_username | default('', true), true) }}"
    bootc_registry_redhat_io_password_effective: "{{ registry_redhat_io_password | default(rhsm_password | default('', true), true) }}"
    bootc_satellite_ca_filename_effective: "satellite-ca.crt"
    bootc_satellite_ca_workspace_path_effective: "{{ bootc_workspace_dir_effective }}/{{ bootc_satellite_ca_filename_effective }}"
    bootc_installer_nameservers_effective: >-
      {{
        bootc_installer_nameservers
        | default(
            [hostvars[groups['dns_hosts'][0]].ansible_host]
            if ((groups['dns_hosts'] | default([])) | length > 0)
            else [],
            true
          )
      }}
    bootc_demo_hosts_block_effective: |-
      {% for host in groups['managed_rhel_hosts'] | default([]) %}
      {% set host_fqdn = hostvars[host].fqdn | default('') %}
      {% set host_name = host if host != host_fqdn else '' %}
      {% set host_domain = host_fqdn.split('.', 1)[1] if '.' in host_fqdn else '' %}
      {% set long_host_fqdn = (host_name ~ '.' ~ host_domain) if host_name and host_domain and (host_name ~ '.' ~ host_domain) != host_fqdn else '' %}
      {{ [hostvars[host].ansible_host, host_fqdn, hostvars[host].dns_name | default(''), host_name, long_host_fqdn] | reject('equalto', '') | unique | join(' ') }}
      {% endfor %}
  tasks:
    - name: Require a supported bootc binding mode
      ansible.builtin.assert:
        that:
          - bootc_binding_effective in ['earlybinding', 'latebinding']
        fail_msg: "Unsupported bootc binding mode {{ bootc_binding_effective }}. Use earlybinding or latebinding."

    - name: Require an AAP OAuth token when AAP auth is selected
      ansible.builtin.assert:
        that:
          - bootc_flightctl_token_effective | trim | length > 0
        fail_msg: "AAP authentication is enabled, but no OAuth token is available for make build-image-early or make build-image-late."
      when: rhem_auth_provider_effective == 'aap'

    - name: Require a flightctl user for the bootc build
      ansible.builtin.assert:
        that:
          - bootc_flightctl_username_effective | trim | length > 0
          - bootc_flightctl_password_effective | trim | length > 0
        fail_msg: "Set Edge Manager credentials in automation/ansible/group_vars/all.yml before running make build-image-early or make build-image-late."
      when: rhem_auth_provider_effective != 'aap'

    - name: Require Satellite registry details when using Satellite as the bootc registry
      ansible.builtin.assert:
        that:
          - bootc_satellite_registry_host_effective | trim | length > 0
          - bootc_satellite_org_id_effective | trim | length > 0
          - bootc_satellite_product_id_effective | trim | length > 0
        fail_msg: "The Satellite registry path is incomplete. Run make start-lab first and keep Satellite enabled, or override bootc_image_repo explicitly."
      when: bootc_use_satellite_registry_effective

    - name: Require registry credentials when publishing bootc artifacts outside Satellite
      ansible.builtin.assert:
        that:
          - bootc_registry_effective | trim | length > 0
          - bootc_registry_username_effective | trim | length > 0
          - bootc_registry_password_effective | trim | length > 0
          - not (bootc_image_repo_effective is match('^localhost/'))
        fail_msg: "Set bootc_registry, bootc_registry_username, bootc_registry_password, and a non-local bootc_image_repo before enabling publish."
      when:
        - bootc_publish_enabled_effective
        - not bootc_use_satellite_registry_effective

    - name: Install build prerequisites on the RHEM host
      ansible.builtin.dnf:
        name:
          - podman
          - skopeo
        state: present

    - name: Create the bootc workspace
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ bootc_workspace_root_effective }}"
        - "{{ bootc_workspace_dir_effective }}"
        - "{{ bootc_flightctl_config_dir }}"
        - "{{ bootc_output_dir_effective }}"

    - name: Require the local demo SSH public key for the device image
      ansible.builtin.assert:
        that:
          - lookup('file', bootc_demo_ssh_public_key_path_effective) | trim | length > 0
        fail_msg: "The demo SSH public key was not found at {{ bootc_demo_ssh_public_key_path_effective }}."

    - name: Copy the local demo SSH public key into the bootc workspace
      ansible.builtin.copy:
        dest: "{{ bootc_demo_ssh_public_key_file_effective }}"
        content: "{{ lookup('file', bootc_demo_ssh_public_key_path_effective) | trim ~ '\n' }}"
        mode: "0644"

    - name: Download the Satellite CA certificate for the demo image and builder host
      ansible.builtin.get_url:
        url: "https://{{ bootc_satellite_registry_host_effective }}/pub/katello-server-ca.crt"
        dest: "{{ bootc_satellite_ca_workspace_path_effective }}"
        mode: "0644"
        validate_certs: false
      when: bootc_use_satellite_registry_effective

    - name: Trust the Satellite registry CA in Podman on the RHEM host
      ansible.builtin.file:
        path: "/etc/containers/certs.d/{{ bootc_registry_effective }}"
        state: directory
        mode: "0755"
      when: bootc_use_satellite_registry_effective

    - name: Install the Satellite CA in Podman on the RHEM host
      ansible.builtin.copy:
        src: "{{ bootc_satellite_ca_workspace_path_effective }}"
        dest: "/etc/containers/certs.d/{{ bootc_registry_effective }}/ca.crt"
        remote_src: true
        mode: "0644"
      when: bootc_use_satellite_registry_effective

    - name: Add the Satellite CA to the system trust store on the RHEM host
      ansible.builtin.copy:
        src: "{{ bootc_satellite_ca_workspace_path_effective }}"
        dest: "/etc/pki/ca-trust/source/anchors/{{ bootc_registry_effective | regex_replace('[^A-Za-z0-9._-]', '_') }}.crt"
        remote_src: true
        mode: "0644"
      when: bootc_use_satellite_registry_effective

    - name: Refresh the system trust store on the RHEM host
      ansible.builtin.command: update-ca-trust
      changed_when: true
      when: bootc_use_satellite_registry_effective

    - name: Log in to registry.redhat.io for bootc image pulls
      ansible.builtin.command:
        argv:
          - podman
          - login
          - registry.redhat.io
          - --username
          - "{{ bootc_registry_redhat_io_username_effective }}"
          - --password
          - "{{ bootc_registry_redhat_io_password_effective }}"
      register: _bootc_registry_redhat_login
      changed_when: "'Login Succeeded' in (_bootc_registry_redhat_login.stdout | default(''))"
      no_log: true
      when:
        - bootc_registry_redhat_io_username_effective | trim | length > 0
        - bootc_registry_redhat_io_password_effective | trim | length > 0

    - name: Authenticate flightctl in an isolated config directory with an AAP token
      ansible.builtin.command:
        argv:
          - flightctl
          - login
          - "{{ bootc_rhem_api_url_effective }}"
          - --config-dir
          - "{{ bootc_flightctl_config_dir }}"
          - --token
          - "{{ bootc_flightctl_token_effective }}"
          - --insecure-skip-tls-verify
      register: _bootc_flightctl_login
      changed_when: true
      no_log: true
      when: rhem_auth_provider_effective == 'aap'

    - name: Authenticate flightctl in an isolated config directory with username and password
      ansible.builtin.command:
        argv:
          - flightctl
          - login
          - "{{ bootc_rhem_api_url_effective }}"
          - --config-dir
          - "{{ bootc_flightctl_config_dir }}"
          - --username
          - "{{ bootc_flightctl_username_effective }}"
          - --password
          - "{{ bootc_flightctl_password_effective }}"
          - --insecure-skip-tls-verify
      register: _bootc_flightctl_login
      changed_when: true
      no_log: true
      when: rhem_auth_provider_effective != 'aap'

    - name: Request an embedded enrollment config for the bootc build
      ansible.builtin.command:
        argv:
          - flightctl
          - certificate
          - request
          - --config-dir
          - "{{ bootc_flightctl_config_dir }}"
          - --signer
          - "{{ bootc_enrollment_signer_effective }}"
          - --expiration
          - "{{ bootc_enrollment_expiration_effective }}"
          - --output
          - embedded
      register: _bootc_enrollment_config
      changed_when: true
      no_log: true

    - name: Normalize the generated enrollment config for this environment
      ansible.builtin.set_fact:
        bootc_enrollment_config_rendered_effective: "{{ _bootc_enrollment_config.stdout | regex_replace('server: https://[^\\s]+', 'server: ' ~ bootc_rhem_agent_api_url_effective) | regex_replace('enrollment-ui-endpoint: https://[^\\s]+', 'enrollment-ui-endpoint: ' ~ bootc_rhem_enrollment_ui_url_effective) }}"
      no_log: true

    - name: Persist the generated enrollment config in the build workspace
      ansible.builtin.copy:
        dest: "{{ bootc_config_file_effective }}"
        content: "{{ bootc_enrollment_config_rendered_effective }}"
        mode: "0600"
      no_log: true
      when: bootc_include_enrollment_config_effective

    - name: Remove any leftover enrollment config from the late-binding workspace
      ansible.builtin.file:
        path: "{{ bootc_config_file_effective }}"
        state: absent
      when: not bootc_include_enrollment_config_effective

    - name: Read the Satellite CA from the build workspace for late binding
      ansible.builtin.slurp:
        src: "{{ bootc_satellite_ca_workspace_path_effective }}"
      register: _bootc_satellite_ca_workspace
      when:
        - not bootc_include_enrollment_config_effective
        - bootc_use_satellite_registry_effective

    - name: Render the late-binding cloud-init user data
      ansible.builtin.copy:
        dest: "{{ bootc_cloud_init_user_data_file_effective }}"
        mode: "0600"
        content: |
          #cloud-config
          write_files:
            - path: /etc/flightctl/config.yaml
              owner: root:root
              permissions: "0600"
              content: |
          {{ bootc_enrollment_config_rendered_effective | indent(16, true) }}
          {% if bootc_use_satellite_registry_effective %}
            - path: /etc/pki/ca-trust/source/anchors/satellite-ca.crt
              owner: root:root
              permissions: "0644"
              content: |
          {{ (_bootc_satellite_ca_workspace.content | b64decode) | indent(16, true) }}
            - path: /etc/containers/certs.d/{{ bootc_registry_effective }}/ca.crt
              owner: root:root
              permissions: "0644"
              content: |
          {{ (_bootc_satellite_ca_workspace.content | b64decode) | indent(16, true) }}
          runcmd:
            - update-ca-trust
          {% endif %}
      no_log: true
      when: not bootc_include_enrollment_config_effective

    - name: Remove any leftover late-binding cloud-init user data from the early-binding workspace
      ansible.builtin.file:
        path: "{{ bootc_cloud_init_user_data_file_effective }}"
        state: absent
      when: bootc_include_enrollment_config_effective

    - name: Copy the demo host mapping helper script
      ansible.builtin.copy:
        src: "{{ bootc_source_dir_effective }}/rhem-demo-hosts.sh"
        dest: "{{ bootc_demo_hosts_script_effective }}"
        mode: "0755"

    - name: Rewrite the demo host mapping helper script for the current environment
      ansible.builtin.replace:
        path: "{{ bootc_demo_hosts_script_effective }}"
        regexp: '(?ms)^# BEGIN RHEM DEMO HOSTS$\n.*^# END RHEM DEMO HOSTS$'
        replace: |-
          # BEGIN RHEM DEMO HOSTS
          {{ bootc_demo_hosts_block_effective }}
          # END RHEM DEMO HOSTS

    - name: Copy the demo host mapping helper service
      ansible.builtin.copy:
        src: "{{ bootc_source_dir_effective }}/rhem-demo-hosts.service"
        dest: "{{ bootc_demo_hosts_service_effective }}"
        mode: "0644"

    - name: Copy the bootc installer Kickstart config
      ansible.builtin.copy:
        src: "{{ bootc_source_dir_effective }}/installer.toml"
        dest: "{{ bootc_installer_config_file_effective }}"
        mode: "0644"
      when: bootc_installer_config_enabled_effective

    - name: Add installer nameservers when requested
      ansible.builtin.replace:
        path: "{{ bootc_installer_config_file_effective }}"
        regexp: '^network --bootproto=dhcp --device=link --activate --onboot=on$'
        replace: "network --bootproto=dhcp --device=link --activate --onboot=on --nameserver={{ bootc_installer_nameservers_effective | join(',') }}"
      when:
        - bootc_installer_config_enabled_effective
        - bootc_installer_nameservers_effective | length > 0

    - name: Copy the bootc Containerfile
      ansible.builtin.copy:
        src: "{{ bootc_source_dir_effective }}/Containerfile"
        dest: "{{ bootc_containerfile_effective }}"
        mode: "0644"

    - name: Set the bootc base image
      ansible.builtin.replace:
        path: "{{ bootc_containerfile_effective }}"
        regexp: '^FROM .*$'
        replace: "FROM {{ bootc_base_image_effective }}"

    - name: Set the Edge Manager repository in the bootc Containerfile
      ansible.builtin.replace:
        path: "{{ bootc_containerfile_effective }}"
        regexp: 'edge-manager-1\.0-for-rhel-9-x86_64-rpms'
        replace: "{{ bootc_edge_manager_repo_effective }}"

    - name: Set the registry host in the bootc Containerfile
      ansible.builtin.replace:
        path: "{{ bootc_containerfile_effective }}"
        regexp: 'satellite\.rhem-eap\.lan'
        replace: "{{ bootc_registry_effective }}"
      when: bootc_use_satellite_registry_effective

    - name: Remove the registry CA section when Satellite is not used for the bootc image
      ansible.builtin.lineinfile:
        path: "{{ bootc_containerfile_effective }}"
        regexp: "{{ item }}"
        state: absent
      loop:
        - '^RUN mkdir -p /etc/containers/certs.d/satellite\.rhem-eap\.lan$'
        - '^ADD satellite-ca\.crt /etc/pki/ca-trust/source/anchors/satellite-ca\.crt$'
        - '^ADD satellite-ca\.crt /etc/containers/certs.d/satellite\.rhem-eap\.lan/ca\.crt$'
        - '^RUN update-ca-trust$'
      when: not bootc_use_satellite_registry_effective

    - name: Remove the enrollment config from the bootc Containerfile when disabled
      ansible.builtin.lineinfile:
        path: "{{ bootc_containerfile_effective }}"
        regexp: '^ADD config\.yaml /etc/flightctl/$'
        state: absent
      when: not bootc_include_enrollment_config_effective

    - name: Check whether the bootc ISO already exists
      ansible.builtin.stat:
        path: "{{ bootc_iso_remote_path_effective }}"
      register: _bootc_existing_iso
      when: bootc_build_iso_effective

    - name: Check whether the bootc qcow2 already exists
      ansible.builtin.stat:
        path: "{{ bootc_qcow2_remote_path_effective }}"
      register: _bootc_existing_qcow2

    - name: Decide whether bootc artifacts need to be rebuilt
      ansible.builtin.set_fact:
        bootc_iso_needs_rebuild: "{{ bootc_build_iso_effective and (bootc_force_rebuild_effective or (not _bootc_existing_iso.stat.exists)) }}"
        bootc_qcow2_needs_rebuild: "{{ bootc_build_qcow2_effective and (bootc_force_rebuild_effective or (not _bootc_existing_qcow2.stat.exists)) }}"
        bootc_artifacts_need_rebuild: >-
          {{
            (bootc_build_iso_effective and (bootc_force_rebuild_effective or (not _bootc_existing_iso.stat.exists))) or
            (bootc_build_qcow2_effective and (bootc_force_rebuild_effective or (not _bootc_existing_qcow2.stat.exists)))
          }}

    - name: Build the bootc operating system image
      ansible.builtin.command:
        argv:
          - podman
          - build
          - -t
          - "{{ bootc_image_ref_effective }}"
          - .
        chdir: "{{ bootc_workspace_dir_effective }}"
      register: _bootc_build
      changed_when: true
      async: 7200
      poll: 15
      when: bootc_artifacts_need_rebuild

    - name: Generate a Sigstore key pair when explicit signing is enabled
      ansible.builtin.command:
        argv:
          - skopeo
          - generate-sigstore-key
          - --output-prefix
          - "{{ bootc_workspace_dir_effective }}/signingkey"
      args:
        creates: "{{ bootc_workspace_dir_effective }}/signingkey.private"
      when: bootc_sign_with_sigstore_effective

    - name: Tag the built bootc image into local container storage for bootc-image-builder
      ansible.builtin.command:
        argv:
          - podman
          - tag
          - "{{ bootc_image_ref_effective }}"
          - "{{ bootc_local_build_image_ref_effective }}"
      register: _bootc_local_tag
      changed_when: true
      when: bootc_local_build_image_ref_effective != bootc_image_ref_effective

    - name: Configure Sigstore attachments for the OCI registry
      ansible.builtin.template:
        src: templates/bootc.sigstore-registry.yaml.j2
        dest: "/etc/containers/registries.d/{{ bootc_registry_effective }}.yaml"
        mode: "0644"
      when: bootc_sign_with_sigstore_effective

    - name: Log in to the OCI registry for image publishing
      ansible.builtin.command:
        argv:
          - podman
          - login
          - "{{ bootc_registry_effective }}"
          - --username
          - "{{ bootc_registry_username_effective }}"
          - --password
          - "{{ bootc_registry_password_effective }}"
      register: _bootc_registry_login
      changed_when: "'Login Succeeded' in (_bootc_registry_login.stdout | default(''))"
      no_log: true
      when:
        - bootc_publish_enabled_effective
        - bootc_registry_effective | trim | length > 0
        - bootc_registry_username_effective | trim | length > 0
        - bootc_registry_password_effective | trim | length > 0

    - name: Push the bootc image to the OCI registry
      ansible.builtin.command:
        argv:
          - podman
          - push
          - "{{ bootc_image_ref_effective }}"
      register: _bootc_push_unsigned
      changed_when: true
      when:
        - bootc_publish_enabled_effective
        - not bootc_sign_with_sigstore_effective

    - name: Push the signed bootc image to the OCI registry
      ansible.builtin.command:
        argv:
          - podman
          - push
          - --sign-by-sigstore-private-key
          - "{{ bootc_workspace_dir_effective }}/signingkey.private"
          - "{{ bootc_image_ref_effective }}"
      register: _bootc_push_signed
      changed_when: true
      when:
        - bootc_publish_enabled_effective
        - bootc_sign_with_sigstore_effective

    - name: Build the bootc ISO artifact
      ansible.builtin.shell: >-
        podman run --rm --privileged --pull=newer --security-opt label=type:unconfined_t
        -v {{ bootc_output_dir_effective | quote }}:/output
        -v /var/lib/containers/storage:/var/lib/containers/storage
        {% if bootc_installer_config_enabled_effective -%}
        -v {{ bootc_installer_config_file_effective | quote }}:/config.toml:ro
        {% endif -%}
        registry.redhat.io/rhel9/bootc-image-builder:latest
        --type iso
        --local
        {% if bootc_installer_config_enabled_effective -%}
        --config /config.toml
        {% endif -%}
        {{ bootc_local_build_image_ref_effective | quote }}
      args:
        executable: /bin/bash
      register: _bootc_iso_build
      changed_when: true
      async: 7200
      poll: 15
      when: bootc_build_iso_effective and bootc_iso_needs_rebuild

    - name: Build the bootc qcow2 artifact
      ansible.builtin.command:
        argv:
          - podman
          - run
          - --rm
          - --privileged
          - --pull=newer
          - --security-opt
          - label=type:unconfined_t
          - -v
          - "{{ bootc_output_dir_effective }}:/output"
          - -v
          - /var/lib/containers/storage:/var/lib/containers/storage
          - registry.redhat.io/rhel9/bootc-image-builder:latest
          - --type
          - qcow2
          - --local
          - "{{ bootc_local_build_image_ref_effective }}"
      register: _bootc_qcow2_build
      changed_when: true
      async: 7200
      poll: 15
      when: bootc_qcow2_needs_rebuild

    - name: Verify that the bootc ISO exists
      ansible.builtin.stat:
        path: "{{ bootc_iso_remote_path_effective }}"
      register: _bootc_iso_file
      when: bootc_build_iso_effective

    - name: Assert the bootc ISO was created
      ansible.builtin.assert:
        that:
          - _bootc_iso_file.stat.exists
        fail_msg: "bootc-image-builder did not produce {{ bootc_iso_remote_path_effective }}."
      when: bootc_build_iso_effective

    - name: Verify that the bootc qcow2 exists
      ansible.builtin.stat:
        path: "{{ bootc_qcow2_remote_path_effective }}"
      register: _bootc_qcow2_file
      when: bootc_build_qcow2_effective

    - name: Assert the bootc qcow2 was created
      ansible.builtin.assert:
        that:
          - _bootc_qcow2_file.stat.exists
        fail_msg: "bootc-image-builder did not produce {{ bootc_qcow2_remote_path_effective }}."
      when: bootc_build_qcow2_effective

    - name: Publish the ISO artifact to the OCI registry
      ansible.builtin.shell: >-
        set -euo pipefail &&
        podman manifest create {{ bootc_disk_image_ref_effective | quote }} &&
        podman manifest add --artifact --artifact-type application/vnd.diskimage.iso
        --arch=amd64 --os=linux
        {{ bootc_disk_image_ref_effective | quote }}
        {{ bootc_iso_remote_path_effective | quote }} &&
        {% if bootc_sign_with_sigstore_effective %}
        podman manifest push --all
        --sign-by-sigstore-private-key {{ (bootc_workspace_dir_effective ~ '/signingkey.private') | quote }}
        {{ bootc_disk_image_ref_effective | quote }}
        docker://{{ bootc_disk_image_ref_effective | quote }}
        {% else %}
        podman manifest push --all
        {{ bootc_disk_image_ref_effective | quote }}
        docker://{{ bootc_disk_image_ref_effective | quote }}
        {% endif %}
      args:
        executable: /bin/bash
      register: _bootc_iso_publish
      changed_when: true
      when:
        - bootc_build_iso_effective
        - bootc_publish_disk_image_enabled_effective

    - name: Report the bootc artifact locations
      ansible.builtin.debug:
        msg:
          image_ref: "{{ bootc_image_ref_effective }}"
          iso_path: "{{ bootc_iso_remote_path_effective }}"
          qcow2_path: "{{ bootc_qcow2_remote_path_effective if bootc_build_qcow2_effective else '' }}"
