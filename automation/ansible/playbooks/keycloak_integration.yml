---
- name: Install and start Keycloak on the dedicated VM
  hosts: keycloak_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    rhem_auth_provider_effective: "{{ rhem_auth_provider | default('keycloak', true) }}"
    keycloak_effective_public_url: "{{ keycloak_public_url | default('http://' ~ fqdn ~ ':8080', true) }}"
    rhem_enable_keycloak_effective: "{{ rhem_enable_keycloak | default(true, true) | bool }}"
    keycloak_local_probe_url: "http://127.0.0.1:8080"
    rhem_effective_ui_url: "{{ rhem_ui_url | default('https://' ~ hostvars[groups['rhem_hosts'][0]].fqdn, true) }}"
    rhem_effective_ui_url_with_default_https_port: "{{ rhem_effective_ui_url | regex_replace('^https://([^/:]+)$', 'https://\\1:443') }}"
    keycloak_redirect_uris_effective: "{{ [rhem_effective_ui_url ~ '/*', rhem_effective_ui_url_with_default_https_port ~ '/*', 'http://localhost:8080/*'] | unique }}"
    keycloak_client_protocol_mappers:
      - name: realm roles in userinfo
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        config:
          user.attribute: foo
          introspection.token.claim: "true"
          access.token.claim: "true"
          id.token.claim: "true"
          userinfo.token.claim: "true"
          claim.name: realm_access.roles
          jsonType.label: String
          multivalued: "true"
    keycloak_seed_users:
      - username: "{{ edge_manager_admin_username }}"
        firstName: "{{ edge_manager_admin_first_name | default('Edge', true) }}"
        lastName: "{{ edge_manager_admin_last_name | default('Manager Admin', true) }}"
        email: "{{ edge_manager_admin_email | default(edge_manager_admin_username ~ '@example.com', true) }}"
        realmRoles:
          - flightctl-admin
          - offline_access
      - username: "{{ edge_manager_ops_username }}"
        firstName: "{{ edge_manager_ops_first_name | default('Edge', true) }}"
        lastName: "{{ edge_manager_ops_last_name | default('Manager Ops', true) }}"
        email: "{{ edge_manager_ops_email | default(edge_manager_ops_username ~ '@example.com', true) }}"
        realmRoles:
          - flightctl-admin
          - offline_access
  tasks:
    - name: Skip Keycloak integration when Keycloak auth is not selected
      ansible.builtin.meta: end_host
      when: rhem_auth_provider_effective != 'keycloak'

    - name: Ensure required packages
      ansible.builtin.dnf:
        name:
          - podman
          - curl
        state: present

    - name: Create Keycloak import directory
      ansible.builtin.file:
        path: "{{ keycloak_import_dir }}"
        state: directory
        mode: "0755"

    - name: Render Keycloak realm import
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/realm-edge-manager.json.j2"
        dest: "{{ keycloak_import_dir }}/realm-edge-manager.json"
        mode: "0644"

    - name: Render Keycloak env file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/keycloak.env.j2"
        dest: /etc/keycloak.env
        mode: "0600"

    - name: Render Keycloak systemd unit
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/keycloak.service.j2"
        dest: /etc/systemd/system/keycloak.service
        mode: "0644"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start Keycloak
      ansible.builtin.systemd:
        name: keycloak
        state: restarted
        enabled: true

    - name: Wait for Keycloak port
      ansible.builtin.wait_for:
        port: 8080
        host: "{{ ansible_host | default(inventory_hostname) }}"
        timeout: 180
      delegate_to: localhost
      become: false

    - name: Wait for Keycloak realm discovery document
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/realms/{{ keycloak_realm }}/.well-known/openid-configuration"
        method: GET
        status_code: 200
        return_content: false
      register: _oidc_probe
      retries: 12
      delay: 5
      until: _oidc_probe.status == 200
      when: rhem_enable_keycloak_effective

    - name: Get Keycloak admin access token
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: admin-cli
          grant_type: password
          username: "{{ keycloak_bootstrap_admin_username }}"
          password: "{{ keycloak_bootstrap_admin_password }}"
        status_code: 200
      register: _keycloak_admin_token
      no_log: true
      when: rhem_enable_keycloak_effective

    - name: Look up the Edge Manager client in Keycloak
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ flightctl_client_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code: 200
      register: _flightctl_clients
      no_log: true
      when: rhem_enable_keycloak_effective

    - name: Read the current Edge Manager client config from Keycloak
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ (_flightctl_clients.json | first).id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code: 200
      register: _flightctl_client
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - (_flightctl_clients.json | length) > 0

    - name: Read current Edge Manager client protocol mappers from Keycloak
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _flightctl_client.json.id }}/protocol-mappers/models"
        method: GET
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code: 200
      register: _flightctl_client_protocol_mappers
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - _flightctl_client is defined

    - name: Look up Keycloak client scopes
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/client-scopes"
        method: GET
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code: 200
      register: _keycloak_client_scopes
      no_log: true
      when: rhem_enable_keycloak_effective

    - name: Look up required Keycloak realm roles
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/roles/{{ item | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code: 200
      loop: "{{ keycloak_seed_users | map(attribute='realmRoles') | flatten | unique }}"
      register: _keycloak_required_realm_roles
      no_log: true
      when: rhem_enable_keycloak_effective

    - name: Look up seeded Edge Manager users in Keycloak
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/users?exact=true&username={{ item.username | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code: 200
      loop: "{{ keycloak_seed_users }}"
      register: _keycloak_seed_user_lookups
      no_log: true
      when: rhem_enable_keycloak_effective

    - name: Update allowed redirect URIs for the Edge Manager client
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _flightctl_client.json.id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        body_format: json
        body: >-
          {{
            _flightctl_client.json
            | combine(
                {
                  'publicClient': true,
                  'standardFlowEnabled': true,
                  'directAccessGrantsEnabled': true,
                  'serviceAccountsEnabled': false,
                  'redirectUris': keycloak_redirect_uris_effective,
                  'webOrigins': ['+']
                },
                recursive=True
              )
          }}
        status_code: 204
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - _flightctl_client is defined

    - name: Attach offline_access as an optional scope for the Edge Manager client
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _flightctl_client.json.id }}/optional-client-scopes/{{ (_keycloak_client_scopes.json | selectattr('name', 'equalto', 'offline_access') | map(attribute='id') | first) }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code:
          - 201
          - 204
      register: _offline_scope_attach
      changed_when: "'offline_access' not in (_flightctl_client.json.optionalClientScopes | default([]))"
      when:
        - rhem_enable_keycloak_effective
        - _flightctl_client is defined
        - (_keycloak_client_scopes.json | selectattr('name', 'equalto', 'offline_access') | list | length) > 0

    - name: Create missing protocol mappers for the Edge Manager client
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _flightctl_client.json.id }}/protocol-mappers/models"
        method: POST
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        body_format: json
        body: "{{ item }}"
        status_code:
          - 200
          - 201
          - 204
      loop: "{{ keycloak_client_protocol_mappers }}"
      changed_when: true
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - _flightctl_client is defined
        - (_flightctl_client_protocol_mappers.json | default([]) | selectattr('name', 'equalto', item.name) | list | length) == 0

    - name: Update protocol mappers for the Edge Manager client
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _flightctl_client.json.id }}/protocol-mappers/models/{{ (_flightctl_client_protocol_mappers.json | selectattr('name', 'equalto', item.name) | map(attribute='id') | first) }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        body_format: json
        body: "{{ item | combine({'id': (_flightctl_client_protocol_mappers.json | selectattr('name', 'equalto', item.name) | map(attribute='id') | first)}, recursive=True) }}"
        status_code: 204
      loop: "{{ keycloak_client_protocol_mappers }}"
      changed_when: >-
        (
          ((_flightctl_client_protocol_mappers.json | selectattr('name', 'equalto', item.name) | first).protocolMapper | default('')) != item.protocolMapper
        ) or (
          ((_flightctl_client_protocol_mappers.json | selectattr('name', 'equalto', item.name) | first).protocol | default('')) != item.protocol
        ) or (
          ((_flightctl_client_protocol_mappers.json | selectattr('name', 'equalto', item.name) | first).config | default({})) != item.config
        )
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - _flightctl_client is defined
        - (_flightctl_client_protocol_mappers.json | default([]) | selectattr('name', 'equalto', item.name) | list | length) > 0

    - name: Update seeded Edge Manager user profile defaults
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/users/{{ (item.json | first).id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        body_format: json
        body: "{{ (item.json | first) | combine({'firstName': item.item.firstName, 'lastName': item.item.lastName, 'email': item.item.email, 'emailVerified': true, 'requiredActions': []}, recursive=True) }}"
        status_code: 204
      loop: "{{ _keycloak_seed_user_lookups.results | default([]) }}"
      changed_when: >-
        ((item.json | first).firstName | default('')) != item.item.firstName or
        ((item.json | first).lastName | default('')) != item.item.lastName or
        ((item.json | first).email | default('')) != item.item.email or
        (((item.json | first).requiredActions | default([])) | length) > 0
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - (item.json | default([]) | length) > 0

    - name: Read seeded Edge Manager user realm role mappings
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/users/{{ (item.json | first).id }}/role-mappings/realm"
        method: GET
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        status_code: 200
      loop: "{{ _keycloak_seed_user_lookups.results | default([]) }}"
      register: _keycloak_seed_user_role_mappings
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - (item.json | default([]) | length) > 0

    - name: Grant required realm roles to seeded Edge Manager users
      ansible.builtin.uri:
        url: "{{ keycloak_local_probe_url }}/admin/realms/{{ keycloak_realm }}/users/{{ (item.json | first).id }}/role-mappings/realm"
        method: POST
        headers:
          Authorization: "Bearer {{ _keycloak_admin_token.json.access_token }}"
        body_format: json
        body: >-
          {{
            (
              _keycloak_required_realm_roles.results
              | selectattr('item', 'in', item.item.realmRoles)
              | map(attribute='json')
              | list
            )
          }}
        status_code:
          - 200
          - 204
      loop: "{{ _keycloak_seed_user_role_mappings.results | default([]) }}"
      changed_when: >-
        (
          item.item.item.realmRoles
          | difference((item.json | default([])) | map(attribute='name') | list)
          | length
        ) > 0
      no_log: true
      when:
        - rhem_enable_keycloak_effective
        - (item.item.json | default([]) | length) > 0
        - (
            item.item.item.realmRoles
            | difference((item.json | default([])) | map(attribute='name') | list)
            | length
          ) > 0

- name: Configure RHEM to use Keycloak for OIDC
  hosts: rhem_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    rhem_auth_provider_effective: "{{ rhem_auth_provider | default('keycloak', true) }}"
    keycloak_effective_public_url: "{{ keycloak_public_url | default('http://' ~ hostvars[groups['keycloak_hosts'][0]].fqdn ~ ':8080', true) }}"
    rhem_effective_base_domain: "{{ rhem_base_domain | default(fqdn, true) }}"
    rhem_effective_ui_url: "{{ rhem_ui_url | default('https://' ~ fqdn, true) }}"
    rhem_effective_api_url: "{{ rhem_api_url | default('https://' ~ fqdn ~ ':3443', true) }}"
    rhem_enable_keycloak_effective: "{{ rhem_enable_keycloak | default(true, true) | bool }}"
  tasks:
    - name: Skip RHEM Keycloak configuration when Keycloak auth is not selected
      ansible.builtin.meta: end_host
      when: rhem_auth_provider_effective != 'keycloak'

    - name: Backup existing flightctl service config
      ansible.builtin.copy:
        src: /etc/flightctl/service-config.yaml
        dest: /etc/flightctl/service-config.yaml.pre-keycloak
        remote_src: true
        force: false
        mode: preserve
      when: rhem_enable_keycloak_effective

    - name: Render flightctl service config for external Keycloak
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/service-config.keycloak.yaml.j2"
        dest: /etc/flightctl/service-config.yaml
        mode: "0644"
        backup: true
      when: rhem_enable_keycloak_effective

    - name: Restart Edge Manager services
      ansible.builtin.systemd:
        name: flightctl.target
        state: restarted
      when: rhem_enable_keycloak_effective

    - name: Wait for Edge Manager API after OIDC reconfiguration
      ansible.builtin.wait_for:
        port: 3443
        host: "{{ ansible_host | default(inventory_hostname) }}"
        timeout: 180
      delegate_to: localhost
      become: false
      when: rhem_enable_keycloak_effective
