---
- name: Install Red Hat Satellite on the dedicated VM
  hosts: satellite_hosts
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    _satellite_enabled: "{{ satellite_install_enabled | default(true, true) | bool }}"
    satellite_version_effective: "{{ satellite_version | default('6.17', true) }}"
    satellite_initial_organization_effective: "{{ satellite_initial_organization | default('RHEM Demo', true) }}"
    satellite_initial_location_effective: "{{ satellite_initial_location | default('Homelab', true) }}"
    satellite_admin_username_effective: "{{ satellite_admin_username | default('admin', true) }}"
    satellite_admin_password_effective: "{{ satellite_admin_password | default('CHANGEME-satellite-admin-password', true) }}"
    satellite_answers_file: /etc/foreman-installer/scenarios.d/satellite-answers.yaml
    satellite_prerequisite_packages:
      - firewalld
      - openssh-server
      - tmux
      - mod_ssl
      - podman
      - skopeo
      - podman-docker
      - systemd-container
      - postgresql-server
    satellite_required_repos:
      - rhel-9-for-x86_64-baseos-rpms
      - rhel-9-for-x86_64-appstream-rpms
      - "satellite-{{ satellite_version_effective }}-for-rhel-9-x86_64-rpms"
      - "satellite-maintenance-{{ satellite_version_effective }}-for-rhel-9-x86_64-rpms"
    satellite_firewall_ports:
      - 8000/tcp
      - 9090/tcp
    satellite_firewall_services:
      - ssh
      - dns
      - dhcp
      - tftp
      - http
      - https
      - puppetmaster
  tasks:
    - name: Skip Satellite install when disabled
      ansible.builtin.meta: end_host
      when: not _satellite_enabled

    - name: Wait for Satellite SSH before gathering facts
      ansible.builtin.wait_for_connection:
        timeout: 900
        delay: 5
        sleep: 5

    - name: Gather Satellite facts after SSH is ready
      ansible.builtin.setup:

    - name: Require a fully qualified hostname for Satellite
      ansible.builtin.assert:
        that:
          - fqdn is defined
          - fqdn | length > 0
          - "'.' in fqdn"
        fail_msg: "Satellite requires a fully qualified hostname. Check the generated inventory for the satellite host."

    - name: Disable all RHSM repositories on the Satellite host
      ansible.builtin.command:
        argv:
          - subscription-manager
          - repos
          - --disable=*
      register: _satellite_repos_disable
      changed_when: "'disabled' in (_satellite_repos_disable.stdout | default('') | lower)"
      failed_when: false

    - name: Enable required Satellite repositories
      ansible.builtin.command:
        argv:
          - subscription-manager
          - repos
          - --enable
          - "{{ item }}"
      loop: "{{ satellite_required_repos }}"
      register: _satellite_repo_enable
      changed_when: "'enabled' in (_satellite_repo_enable.stdout | default('') | lower)"

    - name: Install Satellite prerequisite packages
      ansible.builtin.dnf:
        name: "{{ satellite_prerequisite_packages }}"
        state: present
        disable_plugin:
          - foreman-protector

    - name: Reset SSH connection after Satellite prerequisite packages
      ansible.builtin.meta: reset_connection

    - name: Wait for Satellite SSH after prerequisite packages
      ansible.builtin.wait_for_connection:
        timeout: 600
        delay: 5
        sleep: 5

    - name: Remove desktop audio compatibility package that conflicts with Satellite
      ansible.builtin.dnf:
        name:
          - pipewire-pulseaudio
        state: absent
        disable_plugin:
          - foreman-protector

    - name: Install Satellite package
      ansible.builtin.dnf:
        name:
          - satellite
        state: present
        allowerasing: true
        disable_plugin:
          - foreman-protector

    - name: Reset SSH connection after Satellite package installation
      ansible.builtin.meta: reset_connection

    - name: Wait for Satellite SSH after Satellite package installation
      ansible.builtin.wait_for_connection:
        timeout: 600
        delay: 5
        sleep: 5

    - name: Enable and start firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Ensure sshd is enabled and started before Satellite install
      ansible.builtin.systemd:
        name: sshd
        state: started
        enabled: true

    - name: Reset SSH connection before Satellite state inspection
      ansible.builtin.meta: reset_connection

    - name: Wait for Satellite SSH before reading installer state
      ansible.builtin.wait_for_connection:
        timeout: 600
        delay: 5
        sleep: 5

    - name: Check whether Satellite has already been initialized
      ansible.builtin.stat:
        path: "{{ satellite_answers_file }}"
      register: _satellite_answers

    - name: Read current Satellite answers file
      ansible.builtin.slurp:
        path: "{{ satellite_answers_file }}"
      register: _satellite_answers_content
      when: _satellite_answers.stat.exists

    - name: Probe Satellite login page before reconfiguration
      ansible.builtin.uri:
        url: "https://{{ fqdn }}/users/login"
        method: GET
        validate_certs: false
        status_code:
          - 200
          - 302
        timeout: 10
      register: _satellite_ui_probe
      failed_when: false
      changed_when: false
      delegate_to: localhost
      become: false

    - name: Decide whether Satellite installer must run
      ansible.builtin.set_fact:
        _satellite_answers_text: "{{ (_satellite_answers_content.content | default('') | b64decode) if _satellite_answers.stat.exists else '' }}"
        _satellite_installer_required: >-
          {{
            (not _satellite_answers.stat.exists) or
            (('initial_organization: ' ~ satellite_initial_organization_effective) not in ((_satellite_answers_content.content | default('') | b64decode) if _satellite_answers.stat.exists else '')) or
            (('initial_location: ' ~ satellite_initial_location_effective) not in ((_satellite_answers_content.content | default('') | b64decode) if _satellite_answers.stat.exists else '')) or
            (_satellite_ui_probe.status | default(0) not in [200, 302])
          }}

    - name: Run satellite-installer for initial deployment
      when: _satellite_installer_required
      block:
        - name: Start satellite-installer
          ansible.builtin.command:
            cmd: >-
              satellite-installer --scenario satellite
              --foreman-initial-organization {{ satellite_initial_organization_effective | quote }}
              --foreman-initial-location {{ satellite_initial_location_effective | quote }}
              --foreman-initial-admin-username {{ satellite_admin_username_effective | quote }}
              --foreman-initial-admin-password {{ satellite_admin_password_effective | quote }}
          register: _satellite_installer
          changed_when: true
          no_log: true
          async: 14400
          poll: 60
          environment:
            TERM: dumb
      rescue:
        - name: Read Satellite installer log after failure
          ansible.builtin.command: tail -n 120 /var/log/foreman-installer/satellite.log
          register: _satellite_log_excerpt
          changed_when: false
          failed_when: false

        - name: Fail with Satellite installer log excerpt
          ansible.builtin.fail:
            msg: >-
              satellite-installer failed on {{ inventory_hostname }}.
              {{
                (_satellite_log_excerpt.stdout | default('No installer log output was captured.'))
                | regex_replace(satellite_admin_password_effective | regex_escape, 'REDACTED')
              }}

    - name: Open required Satellite ports in firewalld
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --permanent
          - --add-port={{ item }}
      loop: "{{ satellite_firewall_ports }}"
      register: _satellite_firewall_ports
      changed_when: _satellite_firewall_ports.rc == 0
      failed_when: false

    - name: Open required Satellite services in firewalld
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --permanent
          - --add-service={{ item }}
      loop: "{{ satellite_firewall_services }}"
      register: _satellite_firewall_services
      changed_when: _satellite_firewall_services.rc == 0
      failed_when: false

    - name: Reload firewalld after Satellite rules change
      ansible.builtin.command: firewall-cmd --reload
      register: _satellite_firewall_reload
      changed_when: _satellite_firewall_reload.rc == 0
      failed_when: false

    - name: Ensure sshd remains enabled and started after Satellite install
      ansible.builtin.systemd:
        name: sshd
        state: started
        enabled: true

    - name: Wait for Satellite HTTPS port
      ansible.builtin.wait_for:
        port: 443
        host: "{{ ansible_host | default(inventory_hostname) }}"
        timeout: 1800
      delegate_to: localhost
      become: false

    - name: Wait for Satellite login page
      ansible.builtin.uri:
        url: "https://{{ fqdn }}/users/login"
        method: GET
        validate_certs: false
        status_code: 200
      register: _satellite_ui
      retries: 30
      delay: 10
      until: _satellite_ui.status == 200
      delegate_to: localhost
      become: false
