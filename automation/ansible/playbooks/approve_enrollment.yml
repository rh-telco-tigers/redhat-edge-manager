---
- import_playbook: aap_token_prepare.yml

- name: Approve pending Edge Manager enrollment requests
  hosts: rhem_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    rhem_auth_provider_effective: "{{ rhem_auth_provider | default('keycloak', true) }}"
    enrollment_flightctl_config_dir_effective: "{{ bootc_workspace_dir | default('/var/lib/rhem-demo/bootc', true) }}/flightctl"
    enrollment_rhem_api_url_effective: "{{ rhem_api_url | default('https://' ~ fqdn ~ ':3443', true) }}"
    enrollment_flightctl_username_effective: "{{ edge_manager_admin_username | default(rhem_admin_username, true) }}"
    enrollment_flightctl_password_effective: "{{ edge_manager_admin_password | default(rhem_admin_password, true) }}"
    enrollment_flightctl_token_effective: "{{ aap_edge_manager_oauth_token | default((hostvars[groups['aap_controllers'][0]].aap_edge_manager_oauth_token_effective | default('')) if ((groups['aap_controllers'] | default([])) | length > 0) else '', true) }}"
    enrollment_default_labels_effective: "{{ device_enrollment_labels | default(['site=homelab', 'fleet=demo'], true) }}"
    enrollment_label_kvs_csv_effective: "{{ device_enrollment_label_kvs_csv | default('', true) }}"
    enrollment_extra_labels_effective: "{{ enrollment_label_kvs_csv_effective.split(',') | map('trim') | reject('equalto', '') | list }}"
    enrollment_wait_for_pending_effective: "{{ enrollment_wait_for_pending | default(false, true) | bool }}"
    enrollment_pending_timeout_seconds_effective: "{{ enrollment_pending_timeout_seconds | default(1800, true) | int }}"
    enrollment_pending_poll_interval_seconds_effective: "{{ enrollment_pending_poll_interval_seconds | default(15, true) | int }}"
    enrollment_pending_retries_effective: "{{ [1, ((enrollment_pending_timeout_seconds_effective | int) // (enrollment_pending_poll_interval_seconds_effective | int))] | max }}"
  tasks:
    - name: Require an AAP OAuth token when AAP auth is selected
      ansible.builtin.assert:
        that:
          - enrollment_flightctl_token_effective | trim | length > 0
        fail_msg: "AAP authentication is enabled, but no OAuth token is available for make approve-enrollment."
      when: rhem_auth_provider_effective == 'aap'

    - name: Require a flightctl user before approving enrollments
      ansible.builtin.assert:
        that:
          - enrollment_flightctl_username_effective | trim | length > 0
          - enrollment_flightctl_password_effective | trim | length > 0
        fail_msg: "Set Edge Manager credentials in automation/ansible/group_vars/all.yml before running make approve-enrollment."
      when: rhem_auth_provider_effective != 'aap'

    - name: Ensure the flightctl config directory exists
      ansible.builtin.file:
        path: "{{ enrollment_flightctl_config_dir_effective }}"
        state: directory
        mode: "0755"

    - name: Authenticate flightctl for enrollment approval with an AAP token
      ansible.builtin.command:
        argv:
          - flightctl
          - login
          - "{{ enrollment_rhem_api_url_effective }}"
          - --config-dir
          - "{{ enrollment_flightctl_config_dir_effective }}"
          - --token
          - "{{ enrollment_flightctl_token_effective }}"
          - --insecure-skip-tls-verify
      register: _enrollment_login
      changed_when: true
      no_log: true
      when: rhem_auth_provider_effective == 'aap'

    - name: Authenticate flightctl for enrollment approval with username and password
      ansible.builtin.command:
        argv:
          - flightctl
          - login
          - "{{ enrollment_rhem_api_url_effective }}"
          - --config-dir
          - "{{ enrollment_flightctl_config_dir_effective }}"
          - --username
          - "{{ enrollment_flightctl_username_effective }}"
          - --password
          - "{{ enrollment_flightctl_password_effective }}"
          - --insecure-skip-tls-verify
      register: _enrollment_login
      changed_when: true
      no_log: true
      when: rhem_auth_provider_effective != 'aap'

    - name: Get the list of pending enrollment requests
      ansible.builtin.command:
        argv:
          - flightctl
          - get
          - enrollmentrequests
          - --config-dir
          - "{{ enrollment_flightctl_config_dir_effective }}"
          - --field-selector=status.approval.approved != true
          - -o
          - json
      register: _pending_enrollment_requests
      changed_when: false
      retries: "{{ enrollment_pending_retries_effective }}"
      delay: "{{ enrollment_pending_poll_interval_seconds_effective }}"
      until: >-
        (not enrollment_wait_for_pending_effective) or
        (((_pending_enrollment_requests.stdout | from_json)['items'] | default([])) | length > 0)

    - name: Extract pending enrollment request names
      ansible.builtin.set_fact:
        _pending_enrollment_response: "{{ _pending_enrollment_requests.stdout | from_json }}"
        _pending_enrollment_names: "{{ ((_pending_enrollment_requests.stdout | from_json)['items'] | default([])) | map(attribute='metadata.name') | list }}"

    - name: Start the effective enrollment labels map from defaults
      ansible.builtin.set_fact:
        _enrollment_labels_map_effective: {}

    - name: Merge the default and requested enrollment labels
      ansible.builtin.set_fact:
        _enrollment_labels_map_effective: "{{ _enrollment_labels_map_effective | combine({ (item.split('=', 1)[0] | trim): (item.split('=', 1)[1] | trim) }) }}"
      loop: "{{ enrollment_default_labels_effective + enrollment_extra_labels_effective }}"
      when:
        - item is string
        - "'=' in item"

    - name: Approve each pending enrollment request
      ansible.builtin.command:
        cmd: >-
          flightctl approve enrollmentrequest/{{ item }}
          --config-dir {{ enrollment_flightctl_config_dir_effective }}
          {% for label in _enrollment_labels_map_effective | dict2items %}-l {{ (label.key ~ '=' ~ label.value) | quote }} {% endfor %}
      loop: "{{ _pending_enrollment_names }}"
      register: _approved_enrollments
      changed_when: true
      when: _pending_enrollment_names | length > 0

    - name: Report when there are no pending enrollment requests
      ansible.builtin.debug:
        msg: "No pending enrollment requests were found."
      when: _pending_enrollment_names | length == 0

    - name: Show the approved enrollment request names
      ansible.builtin.debug:
        var: _pending_enrollment_names
      when: _pending_enrollment_names | length > 0

    - name: Show the labels used for enrollment approval
      ansible.builtin.debug:
        var: _enrollment_labels_map_effective
      when: _pending_enrollment_names | length > 0
